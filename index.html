<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorryyamaliuiu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <h1 class="main-title">Sorryyamaliuiu</h1>

        <img src="IMG_7227.PNG" alt="Вітання" class="welcome-image">
        
        <p class="description">Натисни кнопку, щоб отримати завдання на сьогодні!</p>

        <p id="attemptsText">Залишилося спроб: 3</p>

        <button id="getTaskBtn">Отримати картку</button>

        <div id="cardDisplay" class="hidden">
            <div class="task-card">
                <h2 id="taskTitle"></h2>
                <img id="taskImage" src="" alt="Ваше завдання">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
