<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Завдань</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f9f9f9; }
        body { font-family: sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-container { text-align: center; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        .welcome-image { width: 100%; max-width: 250px; border-radius: 15px; margin-bottom: 1rem; }
        #getTaskBtn { background: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; width: 100%; }
        #getTaskBtn:disabled { background: #b2bec3; cursor: not-allowed; }
        .hidden { display: none; }
        .task-card { margin-top: 2rem; padding: 1rem; border: 2px dashed var(--primary); border-radius: 15px; }
        #taskImage { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="IMG_7277.JPG.jpeg" alt="Вітання" class="welcome-image">
        <h1>Привіт! ✨</h1>
        <p>У тебе є 3 спроби на сьогодні.</p>

        <button id="getTaskBtn">Отримати картку</button>

        <div id="cardDisplay" class="hidden">
            <div class="task-card">
                <img id="taskImage" src="" alt="Завдання">
                <h2 id="taskTitle">Ваше завдання!</h2>
            </div>
        </div>
    </div>

    <script>
        const getTaskBtn = document.getElementById('getTaskBtn');
        const cardDisplay = document.getElementById('cardDisplay');
        const taskImage = document.getElementById('taskImage');

        // These names now match your files exactly!
        const taskImages = [
            "IMG_7269.JPG.jpeg", "IMG_7270.JPG.jpeg", "IMG_7271.JPG.jpeg", 
            "IMG_7272.JPG.jpeg", "IMG_7273.JPG.jpeg", "IMG_7274.JPG.jpeg",
            "IMG_7275.JPG.jpeg", "IMG_7276.JPG.jpeg", "IMG_7278.JPG.jpeg", "IMG_7279.JPG.jpeg"
        ];

        function getToday() { return new Date().toDateString(); }

        function updateUI(count) {
            const left = 3 - count;
            getTaskBtn.innerText = left > 0 ? Отримати картку (Спроб: ${left}) : "Спроби вичерпано 🌙";
            if (left <= 0) getTaskBtn.disabled = true;
        }

        getTaskBtn.addEventListener('click', () => {
            let data = JSON.parse(localStorage.getItem('taskApp')) || { date: getToday(), count: 0 };
            
            if (data.date !== getToday()) data = { date: getToday(), count: 0 };

            if (data.count < 3) {
                const randomImg = taskImages[Math.floor(Math.random() * taskImages.length)];
                taskImage.src = randomImg;
                cardDisplay.classList.remove('hidden');
                
                data.count++;
                localStorage.setItem('taskApp', JSON.stringify(data));
                updateUI(data.count);
            }
        });

        // Initialize
        const saved = JSON.parse(localStorage.getItem('taskApp'));
        updateUI(saved && saved.date === getToday() ? saved.count : 0);
    </script>
</body>
</html>

</body>
</html>
