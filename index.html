<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Завдань</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <img src="IMG_7227.PNG" alt="Вітання" class="welcome-image">
        
        <h1>Привіт! ✨</h1>
        <p class="description">Натисни кнопку, щоб отримати випадкове завдання на сьогодні.</p>
        
        <button id="getTaskBtn">Отримати картку</button>

        <div id="cardDisplay" class="hidden">
            <div class="task-card">
                <img id="taskImage" src="" alt="Картка із завданням">
                <h2 id="taskTitle"></h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
